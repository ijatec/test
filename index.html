<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지역 열섬현상 탐사대</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tensorflow.js & Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
</head>
<body class="bg-[#fbf9f8] text-[#1b1c1c] font-sans">

    <nav class="bg-[#fbf9f8] border-b border-[#e4e2e2] p-4">
        <div class="max-w-4xl mx-auto flex items-center gap-2">
            <div class="text-[#aa3000] font-bold text-xl">🌡️ 지역 열섬현상 탐사대</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <div class="bg-white p-6 rounded-2xl border border-[#e4e2e2] shadow-sm">
            <h2 class="text-xl font-bold mb-4">현장 탐사 AI 분석기</h2>
            
            <input type="file" id="imageInput" accept="image/*" class="mb-4 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-[#ffdbd0] file:text-[#aa3000]">
            
            <img id="preview" class="max-w-full h-auto rounded-lg mb-4 hidden" />
            
            <div id="result" class="font-bold text-[#aa3000]"></div>

            <div id="ideaForm" class="mt-6 space-y-3 hidden">
                <input type="text" id="schoolName" placeholder="학교명" class="w-full p-3 border rounded-xl">
                <input type="text" id="studentName" placeholder="이름" class="w-full p-3 border rounded-xl">
                <textarea id="studentIdea" placeholder="열섬 현상 해결 아이디어를 적어보세요!" class="w-full p-3 border rounded-xl h-24"></textarea>
                <button onclick="submitData()" class="w-full bg-[#aa3000] text-white py-3 rounded-xl font-bold">제출하고 저장하기</button>
            </div>
        </div>
    </main>

    <script>
        let model;
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbx2-jfjxEFp71V83hfGCCvi8YIyl9DBmeKmUZPkbMnv1qTxItC3pv9RhoXGVlKHoPJV/exec";

        // 1. 모델 로드
        async function loadModel() {
            const modelURL = "https://teachablemachine.withgoogle.com/models/1NS0yD0kK/model.json";
            const metadataURL = "https://teachablemachine.withgoogle.com/models/1NS0yD0kK/metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            console.log("모델 로드 완료");
        }
        loadModel();

        // 2. 이미지 분석
        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const img = document.getElementById('preview');
                img.src = event.target.result;
                img.classList.remove('hidden');
                
                img.onload = async () => {
                    const predictions = await model.predict(img);
                    const top = predictions.sort((a,b) => b.probability - a.probability)[0];
                    document.getElementById('result').innerText = `분석 결과: ${top.className} (${Math.round(top.probability*100)}%)`;
                    document.getElementById('ideaForm').classList.remove('hidden');
                };
            };
            reader.readAsDataURL(file);
        });

        // 3. 구글 시트 전송
        async function submitData() {
            const payload = {
                timestamp: new Date().toLocaleString(),
                school: document.getElementById('schoolName').value,
                name: document.getElementById('studentName').value,
                idea: document.getElementById('studentIdea').value
            };

            await fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            });
            alert("저장되었습니다!");
        }
    </script>
</body>
</html>
