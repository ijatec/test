<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 현장 탐사</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
</head>
<body class="bg-[#fbf9f8] text-[#1b1c1c]">
    <nav class="bg-white border-b p-4">
        <div class="max-w-4xl mx-auto flex gap-6 font-bold text-[#5a4139]">
            <a href="index.html" class="hover:text-[#aa3000]">대시보드</a>
            <a href="explorer.html" class="text-[#aa3000]">AI 현장 탐사</a>
            <a href="about.html" class="hover:text-[#aa3000]">탐사대 소개</a>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto p-6">
        <div class="bg-white p-6 rounded-2xl border border-[#e4e2e2] shadow-sm">
            <h2 class="text-xl font-bold mb-4">현장 사진 업로드 및 분석</h2>
            <input type="file" id="imageInput" class="mb-4 block w-full text-sm text-gray-500 file:bg-[#ffdbd0] file:border-0 file:py-2 file:px-4 file:rounded-full file:font-semibold file:text-[#aa3000]">
            <img id="preview" class="max-w-full h-auto rounded-lg mb-4 hidden" />
            <div id="result" class="font-bold text-[#aa3000] mb-4"></div>
            
            <div id="ideaForm" class="hidden space-y-3">
                <input type="text" id="schoolName" placeholder="학교명" class="w-full p-3 border rounded-xl">
                <input type="text" id="studentName" placeholder="이름" class="w-full p-3 border rounded-xl">
                <textarea id="studentIdea" placeholder="해결 아이디어를 적어보세요!" class="w-full p-3 border rounded-xl h-24"></textarea>
                <button onclick="submitData()" class="w-full bg-[#aa3000] text-white py-3 rounded-xl font-bold">저장하기</button>
            </div>
        </div>
    </main>

    <script>
        let model, predictionData;
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbx2-jfjxEFp71V83hfGCCvi8YIyl9DBmeKmUZPkbMnv1qTxItC3pv9RhoXGVlKHoPJV/exec";
        
        async function loadModel() {
            model = await tmImage.load("https://teachablemachine.withgoogle.com/models/1NS0yD0kK/model.json", "https://teachablemachine.withgoogle.com/models/1NS0yD0kK/metadata.json");
        }
        loadModel();

        document.getElementById('imageInput').addEventListener('change', async (e) => {
            const img = document.getElementById('preview');
            img.src = URL.createObjectURL(e.target.files[0]);
            img.onload = async () => {
                const predictions = await model.predict(img);
                predictionData = predictions.sort((a,b) => b.probability - a.probability)[0];
                document.getElementById('result').innerText = `분석 결과: ${predictionData.className} (${Math.round(predictionData.probability*100)}%)`;
                document.getElementById('ideaForm').classList.remove('hidden');
                img.classList.remove('hidden');
            };
        });

        async function submitData() {
            const payload = {
                timestamp: new Date().toLocaleString(),
                school: document.getElementById('schoolName').value,
                name: document.getElementById('studentName').value,
                idea: document.getElementById('studentIdea').value
            };
            await fetch(GOOGLE_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("저장되었습니다!");
        }
    </script>
</body>
</html>
